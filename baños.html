<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Reformas de Baños Modernos | Reformas y Decoraciones</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Reformas de baños modernos con diseños funcionales, elegantes y tecnología actual. Remodelamos espacios con calidad y estilo.">

  <link rel="icon" href="helmet.png">
  <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

  <style>
    body {
      font-family: "Lato", sans-serif;
      background-color: #FAEBF7;
    }

    /* =======================
       CATEGORÍAS (DESKTOP)
    ======================== */
    .menu-desktop {
      max-width: 1000px;
      margin: auto;
    }

    .categorias {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-top: 40px;
    }

    .categoria-card {
      background: #f5f5f5;
      border-radius: 15px;
      padding: 30px 20px;
      text-align: center;
      text-decoration: none;
      color: #333;
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .categoria-card i {
      font-size: 40px;
      margin-bottom: 15px;
      color: #4CAF50;
    }

    .categoria-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    }

    /* =======================
       MENÚ MÓVIL COMPACTO
    ======================== */
    .menu-movil {
      display: none;
      text-align: center;
      margin: 30px 0;
    }

    .menu-movil button {
      background: #4CAF50;
      color: white;
      border: none;
      padding: 12px 25px;
      border-radius: 30px;
      font-size: 16px;
      cursor: pointer;
    }

    /* =======================
       GALERÍA
    ======================== */
    .galeria {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }

    .galeria img {
      width: 100%;
      border-radius: 15px;
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .galeria img:hover {
      transform: scale(1.05);
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }

    footer {
      background-color: #ea899a;
      padding: 20px;
      text-align: center;
      color: white;
      margin-top: 60px;
    }

    /* =======================
       RESPONSIVE (MÓVIL)
    ======================== */
    @media (max-width: 768px) {
      .menu-desktop {
        display: none;
      }

      .menu-movil {
        display: block;
      }
    }
  </style>
</head>

<body>

<!-- MENÚ DESKTOP -->
<div class="w3-container w3-padding-64 menu-desktop">
  <h2 class="w3-center w3-wide">Nuestros Servicios</h2>

  <div class="categorias">
    <a href="index.html" class="categoria-card">
      <i class="fa fa-home"></i>
      <h3>Inicio</h3>
    </a>

    <a href="baños.html" class="categoria-card">
      <i class="fa fa-bath"></i>
      <h3>Baños</h3>
    </a>

    <a href="cocinas.html" class="categoria-card">
      <i class="fa fa-cutlery"></i>
      <h3>Cocinas</h3>
    </a>

    <a href="cabañas.html" class="categoria-card">
      <i class="fa fa-home"></i>
      <h3>Cabañas</h3>
    </a>

    <a href="construcciones.html" class="categoria-card">
      <i class="fa fa-building"></i>
      <h3>Construcciones</h3>
    </a>
  </div>
</div>

<!-- MENÚ MÓVIL -->
<div class="menu-movil">
  <button onclick="toggleMenu()">MENU</button>

  <div id="menuCategorias" class="categorias" style="display:none;">
    <a href="index.html" class="categoria-card">Inicio</a>
    <a href="baños.html" class="categoria-card">Baños</a>
    <a href="cocinas.html" class="categoria-card">Cocinas</a>
    <a href="cabañas.html" class="categoria-card">Cabañas</a>
    <a href="construcciones.html" class="categoria-card">Construcciones</a>
  </div>
</div>

<!-- SECCIÓN BAÑOS -->

<script>
  function toggleMenu() {
    const menu = document.getElementById("menuCategorias");
    menu.style.display = menu.style.display === "none" ? "grid" : "none";
  }
</script>

</body>
</html>
